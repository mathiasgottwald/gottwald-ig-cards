name: Token Setup
on:
  workflow_dispatch:
    inputs:
      ig_code:
        description: 'OAuth Code'
        required: true
        type: string
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Exchange tokens and set secrets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IG_CODE: ${{ github.event.inputs.ig_code }}
        run: |
          set -e
          R=$(curl -sf -X POST https://api.instagram.com/oauth/access_token \
            -F client_id=1337870704964499 \
            -F client_secret=87168eb2ce7950dcd84d69faf8f43c08 \
            -F grant_type=authorization_code \
            -F redirect_uri=https://mathiasgottwald.github.io/gottwald-ig-cards/ \
            -F "code=${IG_CODE}")
          echo "R=$R"
          S=$(echo "$R"|python3 -c "import sys,json;d=json.load(sys.stdin);print(d[chr(97)+chr(99)+chr(99)+chr(101)+chr(115)+chr(115)+chr(95)+chr(116)+chr(111)+chr(107)+chr(101)+chr(110)])")
          U=$(echo "$R"|python3 -c "import sys,json;d=json.load(sys.stdin);print(d[chr(117)+chr(115)+chr(101)+chr(114)+chr(95)+chr(105)+chr(100)])")
          R2=$(curl -sf "https://graph.instagram.com/access_token?grant_type=ig_exchange_token&client_secret=87168eb2ce7950dcd84d69faf8f43c08&access_token=${S}")
          echo "R2=$R2"
          L=$(echo "$R2"|python3 -c "import sys,json;d=json.load(sys.stdin);print(d[chr(97)+chr(99)+chr(99)+chr(101)+chr(115)+chr(115)+chr(95)+chr(116)+chr(111)+chr(107)+chr(101)+chr(110)])")
          printf '%s' "$L" | gh secret set IG_ACCESS_TOKEN -R mathiasgottwald/gottwald-ig-cards
          printf '%s' "$U" | gh secret set IG_USER_ID -R mathiasgottwald/gottwald-ig-cards
          echo "SUCCESS IG_USER_ID=$U"
