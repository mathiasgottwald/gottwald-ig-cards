name: Token Setup
on:
  workflow_dispatch:
      inputs:
            ig_code:
                    description: 'OAuth Code'
                            required: true
                                    type: string
                                    jobs:
                                      get-token:
                                          runs-on: ubuntu-latest
                                              steps:
                                                    - name: Get tokens and set secrets
                                                            env:
                                                                      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                              run: |
                                                                                        RESP=$(curl -s -X POST https://api.instagram.com/oauth/access_token -F client_id=1337870704964499 -F client_secret=87168eb2ce7950dcd84d69faf8f43c08 -F grant_type=authorization_code -F redirect_uri=https://mathiasgottwald.github.io/gottwald-ig-cards/ -F "code=${{ github.event.inputs.ig_code }}")
                                                                                                  echo "$RESP"
                                                                                                            SHORT=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['access_token'])")
                                                                                                                      UID=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['user_id'])")
                                                                                                                                RESP2=$(curl -s "https://graph.instagram.com/access_token?grant_type=ig_exchange_token&client_secret=87168eb2ce7950dcd84d69faf8f43c08&access_token=$SHORT")
                                                                                                                                          echo "$RESP2"
                                                                                                                                                    LONG=$(echo "$RESP2" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['access_token'])")
                                                                                                                                                              printf '%s' "$LONG" | gh secret set IG_ACCESS_TOKEN --repo mathiasgottwald/gottwald-ig-cards
                                                                                                                                                                        printf '%s' "$UID" | gh secret set IG_USER_ID --repo mathiasgottwald/gottwald-ig-cards
                                                                                                                                                                                  echo "DONE IG_USER_ID=$UID"
